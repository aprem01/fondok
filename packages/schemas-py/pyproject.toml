[project]
name = "fondok-schemas"
version = "0.1.0"
description = "Fondok shared Pydantic schemas — single source of truth for engine I/O."
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.7"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["fondok_schemas"]
