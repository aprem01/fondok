name: Promote fondok-app alias

# Why this exists
# ---------------
# The Vercel project's auto-managed production domain is
# fondok-one.vercel.app. fondok-app.vercel.app is a plain alias —
# nothing promotes it on deploy, so it drifts onto stale builds after
# every push (the source of repeated "still broken / hard-refresh"
# reports). This workflow re-points fondok-app.vercel.app at the
# latest Ready production deployment so it always serves current.
#
# Strategy: we do NOT require the deployment to match this exact
# commit SHA. Vercel skips builds for commits that don't touch
# deployable files (a .github/ or docs-only change produces no new
# deployment) — a SHA-strict workflow would then no-op forever. We
# just alias fondok-app to whatever the newest Ready production
# deployment is, which is correct in every case: a code push creates
# a new latest; a CI/docs push leaves the previous latest in place
# and re-aliasing to it is a harmless no-op.
#
# One-time setup: add a repo secret VERCEL_TOKEN
#   GitHub → repo → Settings → Secrets and variables → Actions → New
#   secret. Create the token at vercel.com/account/tokens (scope:
#   aprem01s-projects).
#
# If VERCEL_TOKEN is absent the job no-ops with a clear message — it
# never fails the push.

on:
  push:
    branches: [main]
  # Manual trigger — GitHub → Actions → "Promote fondok-app alias" →
  # Run workflow. Useful to re-point fondok-app without a code push.
  workflow_dispatch:

# Don't pile up runs — only the newest commit's alias matters.
concurrency:
  group: alias-fondok-app
  cancel-in-progress: true

jobs:
  alias:
    runs-on: ubuntu-latest
    steps:
      - name: Guard — VERCEL_TOKEN present
        id: guard
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "VERCEL_TOKEN not set — skipping alias promotion."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Vercel CLI
        if: steps.guard.outputs.skip == 'false'
        run: npm install -g vercel@latest

      - name: Wait for a Ready production deploy, then alias fondok-app
        if: steps.guard.outputs.skip == 'false'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SCOPE: aprem01s-projects
        run: |
          set -uo pipefail
          # A code push triggers a Vercel build that takes ~1-2 min to
          # go Ready. Give it a short head start so we don't grab the
          # *previous* deployment, then poll for the newest Ready one.
          sleep 45

          # Strip ANSI escape codes (the Vercel CLI emits them even in
          # non-TTY contexts). Earlier runs failed because the colored
          # "● Ready" status code carried ANSI bytes that broke the
          # column-position grep.
          strip_ansi() {
            sed -E 's/\x1b\[[0-9;]*[A-Za-z]//g; s/\x1b\([A-Za-z]//g'
          }

          for i in $(seq 1 90); do
            # Don't swallow stderr — auth/network errors should show up
            # in CI logs. `|| true` keeps the pipeline going on a
            # transient failure so we re-poll.
            RAW=$(vercel ls fondok --prod \
                    --token "$VERCEL_TOKEN" --scope "$SCOPE" \
                  2>&1 || true)
            CLEAN=$(printf '%s\n' "$RAW" | strip_ansi)

            # Dump the first two attempts so future failures are
            # diagnosable from the workflow logs.
            if [ "$i" -le 2 ]; then
              echo "── vercel ls output (attempt $i) ──"
              printf '%s\n' "$CLEAN" | head -10
              echo "────────────────────────────────────"
            fi

            # Find the URL on any line that contains "Ready" anywhere
            # (status column, with or without the bullet glyph).
            URL=$(printf '%s\n' "$CLEAN" \
                  | awk '/[Rr]eady/ {print}' \
                  | grep -oE 'https://fondok-[a-z0-9]+-aprem01s-projects\.vercel\.app' \
                  | head -1 || true)

            if [ -n "${URL:-}" ]; then
              CURRENT_RAW=$(vercel inspect fondok-app.vercel.app \
                              --token "$VERCEL_TOKEN" --scope "$SCOPE" \
                            2>&1 || true)
              CURRENT=$(printf '%s\n' "$CURRENT_RAW" | strip_ansi \
                        | grep -oE 'https://fondok-[a-z0-9]+-aprem01s-projects\.vercel\.app' \
                        | head -1 || true)
              if [ "$URL" = "$CURRENT" ]; then
                echo "✅ fondok-app.vercel.app already on latest ($URL) — no-op."
                exit 0
              fi
              vercel alias set "$URL" fondok-app.vercel.app \
                --token "$VERCEL_TOKEN" --scope "$SCOPE"
              echo "✅ fondok-app.vercel.app → $URL"
              exit 0
            fi
            echo "[$i/90] no Ready production deployment yet — waiting…"
            sleep 10
          done
          echo "::warning::No Ready production deployment found after ~16min — fondok-app left unchanged."
          exit 0
