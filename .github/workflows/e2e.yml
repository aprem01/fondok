name: E2E
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: cd apps/web && npx playwright install --with-deps chromium

      - name: Run E2E
        env:
          # Demo persona kicks in via lib/auth.ts when the key ends in _dummy.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy
          # Empty worker URL forces the API client into mock mode so
          # tests never hit a real backend.
          NEXT_PUBLIC_WORKER_URL: ''
        run: cd apps/web && pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/e2e/.report/
          retention-days: 7
