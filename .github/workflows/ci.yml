name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm install

      - name: Lint web
        working-directory: apps/web
        run: npx --yes next lint --max-warnings=0
        continue-on-error: true

      - name: Build web
        working-directory: apps/web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npx --yes next build

  python:
    name: Python (worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install worker deps
        working-directory: apps/worker
        run: uv sync --extra dev

      - name: Ruff (informational)
        working-directory: apps/worker
        run: uv run ruff check .
        continue-on-error: true

      - name: Pytest
        working-directory: apps/worker
        env:
          DATABASE_URL: sqlite+aiosqlite:///./fondok-ci.db
          ANTHROPIC_API_KEY: sk-ant-test-dummy
        run: uv run pytest tests/ -v

      - name: Import smoke
        working-directory: apps/worker
        env:
          DATABASE_URL: sqlite+aiosqlite:///./fondok-ci.db
        run: uv run python -c "from app.main import app; print('OK')"

  evals:
    name: Golden-set regression
    runs-on: ubuntu-latest
    needs: [python]
    # REQUIRED check: runs on every push to main and every PR. The
    # deterministic engine pipeline burns no LLM tokens, so it's cheap
    # enough to gate every merge — drift in math is an instant red.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install worker deps
        working-directory: apps/worker
        run: uv sync --extra dev

      - name: Run golden set
        id: golden
        working-directory: ${{ github.workspace }}
        env:
          # Engines are deterministic; LLM is not invoked in the eval
          # pipeline, so the API key isn't required here. Leaving the
          # secret reference in place so an env override (mocking) can
          # still be wired in later without rewriting the workflow.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-ant-test-dummy' }}
          EVALS_MOCK: "true"
        run: uv run --project apps/worker python evals/run.py | tee evals/last-run.txt

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-set-results
          path: |
            evals/results.xml
            evals/last-run.txt
          if-no-files-found: warn

      - name: Publish drift report to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Golden-set drift report\n\n';
            try {
              const txt = fs.readFileSync('evals/last-run.txt', 'utf8');
              body += '```\n' + txt + '```\n';
            } catch (e) {
              body += '_(no drift report produced)_\n';
            }
            const { owner, repo } = context.repo;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Annotate PR with JUnit results
        if: always() && github.event_name == 'pull_request'
        uses: dorny/test-reporter@v1
        continue-on-error: true
        with:
          name: Golden-set drift
          path: evals/results.xml
          reporter: java-junit
          fail-on-error: false
