name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm install

      - name: Lint web
        working-directory: apps/web
        run: npx --yes next lint --max-warnings=0
        continue-on-error: true

      - name: Build web
        working-directory: apps/web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npx --yes next build

  python:
    name: Python (worker)
    runs-on: ubuntu-latest
    services:
      # Mirror Railway's Postgres add-on locally so the worker test
      # suite exercises the same driver path (asyncpg) it uses in prod.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fondok
          POSTGRES_PASSWORD: fondok
          POSTGRES_DB: fondok
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U fondok"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install worker deps
        working-directory: apps/worker
        run: uv sync --extra dev

      - name: Ruff (informational)
        working-directory: apps/worker
        run: uv run ruff check .
        continue-on-error: true

      - name: Pytest
        working-directory: apps/worker
        env:
          DATABASE_URL: postgresql+asyncpg://fondok:fondok@localhost:5432/fondok
          ANTHROPIC_API_KEY: sk-ant-test-dummy
        run: uv run pytest tests/ -v

      - name: Import smoke
        working-directory: apps/worker
        env:
          DATABASE_URL: postgresql+asyncpg://fondok:fondok@localhost:5432/fondok
        run: uv run python -c "from app.main import app; print('OK')"

  # Conditional eval gating ported from LogiCov: only burn a CI minute
  # on the golden set when something the engines/agents/graph/schemas/
  # evals depend on actually changed — or when we're landing on main
  # (where drift must be caught before deploy). PRs that only touch
  # web, docs, or infra skip the regression entirely.
  evals:
    name: Golden-set regression
    runs-on: ubuntu-latest
    needs: [python]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files, 'apps/worker/app/engines/') ||
      contains(github.event.pull_request.changed_files, 'apps/worker/app/agents/') ||
      contains(github.event.pull_request.changed_files, 'apps/worker/app/graph.py') ||
      contains(github.event.pull_request.changed_files, 'packages/schemas-py/') ||
      contains(github.event.pull_request.changed_files, 'evals/')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install worker deps
        working-directory: apps/worker
        run: uv sync --extra dev

      - name: Run golden set
        id: golden
        working-directory: ${{ github.workspace }}
        env:
          # Engines are deterministic; LLM is not invoked in the eval
          # pipeline, so the API key isn't required here. EVALS_MOCK=true
          # keeps CI from burning Anthropic tokens.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-ant-test-dummy' }}
          EVALS_MOCK: "true"
        run: uv run --project apps/worker python evals/run.py | tee evals/last-run.txt

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-set-results
          path: |
            evals/results.xml
            evals/last-run.txt
          if-no-files-found: warn

      - name: Publish drift report to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Golden-set drift report\n\n';
            try {
              const txt = fs.readFileSync('evals/last-run.txt', 'utf8');
              body += '```\n' + txt + '```\n';
            } catch (e) {
              body += '_(no drift report produced)_\n';
            }
            const { owner, repo } = context.repo;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Annotate PR with JUnit results
        if: always() && github.event_name == 'pull_request'
        uses: dorny/test-reporter@v1
        continue-on-error: true
        with:
          name: Golden-set drift
          path: evals/results.xml
          reporter: java-junit
          fail-on-error: false
